[[mgr.prepend_keymap]]
on   = "<Space>"
run  = 'shell "$HOME/dotfiles/scripts/quicklook.sh %h" --block'
desc = "Quick Look preview"

[[mgr.prepend_keymap]]
on   = "<C-r>"
run  = 'shell -- "$HOME/dotfiles/scripts/reveal.sh" "$@"'
desc = "Reveal in file manager"

[[mgr.prepend_keymap]]
on   = "i"
run  = "plugin imgview"
desc = "View image full-res (Kitty)"
