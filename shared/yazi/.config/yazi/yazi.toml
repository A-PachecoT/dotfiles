[opener]
edit = [
  { run = '$EDITOR "$@"', block = true },
]
open = [
  { run = 'open "$@"', orphan = true, for = "macos" },
]
pdf-skim = [
  { run = 'open -a Skim "$@"', orphan = true, for = "macos", desc = "Skim (GUI, live reload)" },
]
pdf-tdf = [
  { run = 'open -na Ghostty --args --title="pdf-viewer" -e tdf "$@"', orphan = true, for = "macos", desc = "tdf (Ghostty flotante, hot reload)" },
]
pdf-pdfgear = [
  { run = 'open -a PDFgear "$@"', orphan = true, for = "macos", desc = "PDFgear (editor, firmas)" },
]

[open]
rules = [
  # Directories - let yazi handle natively (no rule needed, this is just documentation)

  # Markdown → always editor (before text/html rule catches them)
  { name = "*.md", use = "edit" },

  # Web files → browser (before text/* catches them)
  { mime = "text/html", use = "open" },

  # Media/documents → system default
  { mime = "image/*", use = "open" },
  { mime = "video/*", use = "open" },
  { mime = "audio/*", use = "open" },

  # PDFs: Enter=Skim, O=picker (Skim / tdf / PDFgear)
  { mime = "application/pdf", use = ["pdf-skim", "pdf-tdf", "pdf-pdfgear"] },

  # Text/code files → editor
  { mime = "text/*", use = "edit" },
  { mime = "application/json", use = "edit" },
  { mime = "application/javascript", use = "edit" },

  # Fallback for unknown files → system default
  { mime = "*", use = "open" },
]
